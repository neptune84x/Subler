name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-runs-on: macos-14 # Xcode 15.4 ve Apple Silicon için ideal

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & GPAC 2.4
      run: |
        # 1. Temizlik
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. Yerel Homebrew tap oluştur
        brew tap-new local/gpac
        FORMULA_PATH=$(brew --repository local/gpac)/Formula/gpac.rb
        mkdir -p $(dirname $FORMULA_PATH)

        # 3. GPAC 2.4.0 Formülü (FFmpeg uyumsuzluğunu aşmak için devre dışı bırakıldı)
        cat << 'EOF' > $FORMULA_PATH
        class Gpac < Formula
          desc "Multimedia framework for interactive and spatio-temporal content"
          homepage "https://gpac.io/"
          url "https://github.com/gpac/gpac/archive/v2.4.0.tar.gz"
          sha256 "99c8c994d5364b963d18eff24af2576b38d38b3460df27d451248982ea16157a"
          license "LGPL-2.1-or-later"

          depends_on "pkg-config" => :build
          depends_on "openssl@3"

          def install
            args = %W[
              --prefix=#{prefix}
              --mandir=#{man}
              --disable-alsa
              --disable-jack
              --disable-pulseaudio
              --use-ffmpeg=no
            ]
            system "./configure", *args
            system "make"
            system "make", "install"
          end
        end
        EOF

        # 4. GPAC'i derleyerek kur
        brew install --build-from-source local/gpac/gpac
        brew pin gpac
        MP4Box -version

    - name: Fix Swift 6 Retroactive Attribute for Xcode 15.4
      run: |
        # Xcode 15.4'ün tanımadığı @retroactive ifadesini koddan temizler
        FILE_PATH="MP42Foundation/MP42/SampleDescription.swift"
        if [ -f "$FILE_PATH" ]; then
          echo "Düzeltiliyor: $FILE_PATH"
          sed -i '' 's/@retroactive //g' "$FILE_PATH"
        fi

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Subler Derleme Süreci
        # SYMROOT dizinini mevcut çalışma alanına çekiyoruz
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # Uygulamayı zip olarak paketle
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
