name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & GPAC 2.4
      run: |
        # 1. Mevcut gpac varsa temizle
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. Yerel bir Homebrew tap'i oluştur
        brew tap-new local/gpac
        
        # 3. GPAC 2.4 formülünü doğru URL üzerinden indir (404 hatasını önlemek için)
        # Not: Eski commitlerde formüller 'Formula/g/' altında değil, doğrudan 'Formula/' altındaydı.
        FORMULA_PATH=$(brew --repository local/gpac)/Formula/gpac.rb
        mkdir -p $(dirname $FORMULA_PATH)
        curl -L https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/gpac.rb -o $FORMULA_PATH
        
        # 4. Dosyanın boş veya 404 olmadığını doğrula
        if grep -q "404: Not Found" "$FORMULA_PATH"; then
          echo "HATA: Formül dosyası indirilemedi (404). URL kontrol edilmeli."
          exit 1
        fi
        
        # 5. Bağımlılıkları önceden kur (derleme hızını artırır ve hataları önler)
        brew install ffmpeg

        # 6. Yeni oluşturduğumuz yerel tap üzerinden kurulumu yap
        brew install local/gpac/gpac
        
        # 7. Sürümü sabitle ve doğrula
        brew pin gpac
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Apple Silicon için Ad-Hoc imzalama ile derleme
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # macOS paket yapısını koruyarak sıkıştır
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
