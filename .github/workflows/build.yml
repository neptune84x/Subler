name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # macOS Apple Silicon runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & GPAC 2.4
      run: |
        # 1. Hata almamak için paket kontrolü yaparak temizlik yapıyoruz
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. GPAC 2.4.0 formülünü yerel bir dosyaya indiriyoruz
        # Bu yöntem Homebrew'un URL kısıtlamasını aşmamızı sağlar
        curl -L https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/g/gpac.rb -o gpac.rb
        
        # 3. Yerel formül dosyasından kurulum yapıyoruz
        brew install --formula ./gpac.rb
        
        # 4. Sürümü sabitliyoruz ve doğruluyoruz
        brew pin gpac
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Ad-Hoc imzalama ile Apple Silicon mimarisinde derleme
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # Paket yapısını bozmadan sıkıştırıyoruz
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
