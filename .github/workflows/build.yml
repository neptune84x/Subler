name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & GPAC 2.4
      run: |
        # 1. Temizlik
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. Yerel Homebrew tap oluştur
        brew tap-new local/gpac
        FORMULA_PATH=$(brew --repository local/gpac)/Formula/gpac.rb
        mkdir -p $(dirname $FORMULA_PATH)

        # 3. GPAC 2.4.0 Formülünü 2.4.0 configure parametrelerine göre yazdır
        cat << 'EOF' > $FORMULA_PATH
        class Gpac < Formula
          desc "Multimedia framework for interactive and spatio-temporal content"
          homepage "https://gpac.io/"
          url "https://github.com/gpac/gpac/archive/v2.4.0.tar.gz"
          sha256 "99c8c994d5364b963d18eff24af2576b38d38b3460df27d451248982ea16157a"
          license "LGPL-2.1-or-later"

          depends_on "pkg-config" => :build
          depends_on "ffmpeg"
          depends_on "openssl@3"

          def install
            # 2.4.0 sürümü için düzeltilmiş configure argümanları
            args = %W[
              --prefix=#{prefix}
              --mandir=#{man}
              --disable-alsa
              --disable-jack
              --disable-pulseaudio
            ]
            
            # Bu sürümde --use-ffmpeg=yes yerine ffmpeg kütüphaneleri 
            # pkg-config üzerinden otomatik algılanır.
            system "./configure", *args
            system "make"
            system "make", "install"
          end
        end
        EOF

        # 4. Bağımlılıkları kur
        brew install ffmpeg

        # 5. Kaynaktan derleyerek kur
        brew install --build-from-source local/gpac/gpac
        
        # 6. Sabitle ve doğrula
        brew pin gpac
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Subler Derleme
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
