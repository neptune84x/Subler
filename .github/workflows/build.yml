name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Alt modülleri (Sparkle vb.) eksiksiz çeker

    - name: Setup Environment & GPAC 2.4
      run: |
        # Mevcut gpac varsa temizle
        brew uninstall --ignore-dependencies gpac || true
        
        # GPAC 2.4.0 sürümünü doğrudan Homebrew geçmişindeki ilgili commit üzerinden yükle
        brew install https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/g/gpac.rb
        
        # Sürümü sabitle (otomatik güncellenmesini engelle)
        brew pin gpac
        
        # Sürümü doğrula (MP4Box komutu 2.4 sürümünde daha sağlıklı çıktı verir)
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # xcodebuild ile derleme süreci. 
        # CODE_SIGN_IDENTITY="-" ifadesi yerel (Ad-Hoc) imzalama sağlar.
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # Uygulama yapısını bozmadan sıkıştırır
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
