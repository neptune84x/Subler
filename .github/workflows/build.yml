name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Apple Silicon (M1/M2/M3) Runner

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & GPAC 2.4
      run: |
        # 1. Temizlik
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. Yerel bir Homebrew tap'i oluştur
        brew tap-new local/gpac
        
        # 3. GPAC 2.4.0 formülünü doğru dizin yapısıyla indir
        # Homebrew 2023 sonrasında /Formula/g/gpac.rb yapısına geçti.
        FORMULA_PATH=$(brew --repository local/gpac)/Formula/gpac.rb
        mkdir -p $(dirname $FORMULA_PATH)
        
        echo "GPAC Formülü indiriliyor..."
        curl -L "https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/g/gpac.rb" -o $FORMULA_PATH

        # 4. Dosya içeriğini kontrol et (404 alıp almadığımızı doğrular)
        if grep -q "404: Not Found" "$FORMULA_PATH"; then
          echo "HATA: Ana URL bulunamadı, alternatif URL deneniyor..."
          curl -L "https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/gpac.rb" -o $FORMULA_PATH
        fi
        
        # 5. Bağımlılıkları hazırla
        brew install ffmpeg

        # 6. Yerel tap üzerinden kurulumu yap
        # --build-from-source bayrağı Apple Silicon uyumluluğunu garanti eder
        brew install --build-from-source local/gpac/gpac
        
        # 7. Sürümü sabitle ve doğrula
        brew pin gpac
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Xcodebuild süreci
        # CODE_SIGN_IDENTITY="-" yerel cihazlarda çalışması için Ad-Hoc imzalama yapar.
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # Uygulama paketini koruyarak sıkıştır
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
