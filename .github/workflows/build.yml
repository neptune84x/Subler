name: Build Subler

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Subler
        uses: actions/checkout@v4

      - name: Checkout MP42Foundation
        uses: actions/checkout@v4
        with:
          repository: SublerApp/MP42Foundation
          path: MP42Foundation

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Create Workspace
        run: |
          mkdir Subler.xcworkspace
          cat > Subler.xcworkspace/contents.xcworkspacedata << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <Workspace version="1.0">
            <FileRef location="group:Subler.xcodeproj"></FileRef>
            <FileRef location="group:MP42Foundation/MP42Foundation.xcodeproj"></FileRef>
          </Workspace>
          EOF

      - name: Build Subler
        run: |
          xcodebuild \
          -workspace Subler.xcworkspace \
          -scheme Subler \
          -configuration Release \
          -destination 'platform=macOS' \
          ONLY_ACTIVE_ARCH=YES \
          BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
          SWIFT_STRICT_CONCURRENCY=off \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -derivedDataPath build

      - name: Prepare App
        run: |
          mkdir artifact
          cp -R build/Build/Products/Release/Subler.app artifact/

      - name: Create DMG
        run: |
          hdiutil create -volname Subler \
          -srcfolder artifact/Subler.app \
          -ov -format UDZO Subler.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Subler
          path: |
            Subler.dmg
            artifact
