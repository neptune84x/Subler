name: Build Subler

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -derivedDataPath build

      - name: Package
        run: |
          mkdir artifact
          cp -R build/Build/Products/Release/Subler.app artifact/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Subler
          path: artifact
