name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel tetikleme seçeneği

jobs:
  build:
    runs-on: macos-14 # macOS Apple Silicon runner kullanıyoruz

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Subler'ın derlenmesi için gereken alt modülleri (Sparkle vb.) çeker

- name: Setup Environment & Force GPAC 2.4
      run: |
        # Homebrew core içinden GPAC 2.4 sürümünün olduğu commit'e gidip o formülü yüklüyoruz
        # Not: Bu yöntem, gpac@2.4 paketi olmadığı durumlarda en sağlıklı yoldur.
        
        # Mevcut gpac varsa kaldırıyoruz
        brew uninstall --ignore-dependencies gpac || true
        
        # GPAC 2.4.0 sürümünü doğrudan kaynak dosyasından yüklüyoruz
        brew install https://raw.githubusercontent.com/Homebrew/homebrew-core/0a3b04c0d028a0503f0b2f671e6205738870313c/Formula/g/gpac.rb
        
        # Sürümü sabitle (upgrade edilmesini engelle)
        brew pin gpac
        
        # Doğrulama: 'gpac -version' yerine 'MP4Box -version' kullanıyoruz. 
        # Bu komut 2.4 sürümünü net bir şekilde teyit eder ve hata kodu döndürmez.
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Ücretsiz geliştirici hesabı kısıtlamalarına takılmamak ve uygulamanın 
        # hatasız derlenmesi için CODE_SIGN_IDENTITY="-" ile ad-hoc imzalama yapıyoruz.
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        # Uygulamayı indirirken dosya izinlerinin ve macOS paket yapısının 
        # bozulmaması için .app klasörünü ditto ile sıkıştırıyoruz.
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler.zip

    - name: Upload Compiled Subler Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Build
        path: build/Release/Subler.zip
