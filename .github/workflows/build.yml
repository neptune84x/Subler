name: Build Custom Subler

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Environment & Embedded GPAC 2.4
      run: |
        # 1. Mevcut gpac varsa temizle
        if brew list gpac &>/dev/null; then
          brew uninstall --force gpac
        fi

        # 2. Yerel bir Homebrew tap'i oluştur
        brew tap-new local/gpac
        FORMULA_PATH=$(brew --repository local/gpac)/Formula/gpac.rb
        mkdir -p $(dirname $FORMULA_PATH)

        # 3. GPAC 2.4.0 formülünü doğrudan dosya içine yazdırıyoruz (404 riskini bitirir)
        cat << 'EOF' > $FORMULA_PATH
        class Gpac < Formula
          desc "Multimedia framework for interactive and spatio-temporal content"
          homepage "https://gpac.io/"
          url "https://github.com/gpac/gpac/archive/v2.4.0.tar.gz"
          sha256 "3b94e35767d4cb7066d7367f08035e4e209176391d44070776b3252a1389c926"
          license "LGPL-2.1-or-later"

          depends_on "pkg-config" => :build
          depends_on "ffmpeg"
          depends_on "openssl@3"

          def install
            args = %W[
              --prefix=#{prefix}
              --mandir=#{man}
              --disable-wx
              --disable-pulseaudio
              --use-ffmpeg=yes
            ]
            system "./configure", *args
            system "make"
            system "make", "install"
          end

          test do
            system "#{bin}/MP4Box", "-version"
          end
        end
        EOF

        # 4. Bağımlılıkları kur
        brew install ffmpeg

        # 5. Kendi yazdığımız formül üzerinden kurulumu yap
        brew install --build-from-source local/gpac/gpac
        
        # 6. Sürümü sabitle ve doğrula
        brew pin gpac
        MP4Box -version

    - name: Build Subler with Ad-Hoc Signing
      run: |
        # Subler derleme süreci
        xcodebuild clean build \
          -project Subler.xcodeproj \
          -scheme Subler \
          -configuration Release \
          -arch arm64 \
          SYMROOT="$(pwd)/build" \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES

    - name: Package Application
      run: |
        cd build/Release
        ditto -c -k --sequesterRsrc --keepParent Subler.app Subler-Custom-Build.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Subler-Web-Output
        path: build/Release/Subler-Custom-Build.zip
